<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0416"/>
      <stop offset="50%" stop-color="#110a2e"/>
      <stop offset="100%" stop-color="#0d0720"/>
    </linearGradient>
    <linearGradient id="glow" x1="400" y1="50" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="piGrad" x1="280" y1="140" x2="520" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#a78bfa" stroke-width="1">
    <!-- Vertical lines -->
    <line x1="80" y1="0" x2="80" y2="450"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="240" y1="0" x2="240" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="560" y1="0" x2="560" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
    <line x1="720" y1="0" x2="720" y2="450"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
  </g>

  <!-- Radial glow center -->
  <ellipse cx="400" cy="225" rx="300" ry="200" fill="url(#radial)"/>

  <!-- Top glow blob -->
  <ellipse cx="400" cy="100" rx="200" ry="80" fill="#6d28d9" opacity="0.12" filter="url(#blur)"/>

  <!-- Outer ring decoration -->
  <circle cx="400" cy="210" r="115" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.25"/>
  <circle cx="400" cy="210" r="95" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.15"/>
  <!-- Dashed outer ring -->
  <circle cx="400" cy="210" r="135" fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="6 8" opacity="0.12"/>

  <!-- Icon background circle -->
  <circle cx="400" cy="210" r="78" fill="#1a0d3d" opacity="0.9"/>
  <circle cx="400" cy="210" r="78" fill="url(#glow)"/>
  <circle cx="400" cy="210" r="77" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>

  <!-- π symbol -->
  <text
    x="400" y="252"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="96"
    font-weight="900"
    text-anchor="middle"
    fill="url(#piGrad)"
    opacity="0.95"
  >π</text>

  <!-- Dot accents around circle -->
  <circle cx="400" cy="132" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="478" cy="210" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="322" cy="210" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="400" cy="288" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="454" cy="154" r="2" fill="#c4b5fd" opacity="0.35"/>
  <circle cx="346" cy="154" r="2" fill="#c4b5fd" opacity="0.35"/>
  <circle cx="454" cy="266" r="2" fill="#c4b5fd" opacity="0.35"/>
  <circle cx="346" cy="266" r="2" fill="#c4b5fd" opacity="0.35"/>

  <!-- Bottom label pill -->
  <rect x="292" y="345" width="216" height="36" rx="18" fill="#1a0d3d" opacity="0.85"/>
  <rect x="292" y="345" width="216" height="36" rx="18" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>

  <!-- Dot indicator -->
  <circle cx="316" cy="363" r="5" fill="#7c3aed" opacity="0.9"/>
  <circle cx="316" cy="363" r="3" fill="#a78bfa"/>

  <text
    x="412" y="369"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="13"
    font-weight="600"
    text-anchor="middle"
    fill="#c4b5fd"
    opacity="0.85"
    letter-spacing="0.5"
  >Breedskoolpi Product</text>

  <!-- Corner decorations - top left -->
  <line x1="16" y1="16" x2="50" y2="16" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <line x1="16" y1="16" x2="16" y2="50" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <!-- Corner decorations - top right -->
  <line x1="784" y1="16" x2="750" y2="16" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <line x1="784" y1="16" x2="784" y2="50" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <!-- Corner decorations - bottom left -->
  <line x1="16" y1="434" x2="50" y2="434" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <line x1="16" y1="434" x2="16" y2="400" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <!-- Corner decorations - bottom right -->
  <line x1="784" y1="434" x2="750" y2="434" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <line x1="784" y1="434" x2="784" y2="400" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>

  <!-- Subtle top-left text -->
  <text x="28" y="34" font-family="-apple-system, sans-serif" font-size="10" fill="#6d28d9" opacity="0.5" font-weight="600" letter-spacing="1">DIGITAL PRODUCT</text>
</svg>
